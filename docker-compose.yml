x-webapi-env: &webapi-env
  ASPNETCORE_ENVIRONMENT: Development
  Jwt__Key: ${JWT_KEY:-dev-only-secret-key-please-override-32chars}

services:
  postgres:
    image: postgres:16
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: productcatalog
      POSTGRES_USER: webapi
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webapi -d productcatalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    profiles: ["mysql"]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: productcatalog
      MYSQL_USER: webapi
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "webapi", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Default: no --profile flag needed. Self-contained, no separate DB container.
  webapi:
    build:
      context: ./WebApi
      dockerfile: Dockerfile
    ports:
      - "5280:8080"
    environment:
      <<: *webapi-env
      Database__Provider: Sqlite
      ConnectionStrings__DefaultConnection: Data Source=/data/ProductCatalog.db
    volumes:
      - sqlite-data:/data

  # docker compose --profile postgres up -d --build
  webapi-postgres:
    build:
      context: ./WebApi
      dockerfile: Dockerfile
    profiles: ["postgres"]
    ports:
      - "5280:8080"
    environment:
      <<: *webapi-env
      Database__Provider: Postgres
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=productcatalog;Username=webapi;Password=password
    depends_on:
      postgres:
        condition: service_healthy

  # docker compose --profile mysql up -d --build
  webapi-mysql:
    build:
      context: ./WebApi
      dockerfile: Dockerfile
    profiles: ["mysql"]
    ports:
      - "5280:8080"
    environment:
      <<: *webapi-env
      Database__Provider: MySql
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=productcatalog;User=webapi;Password=password
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  postgres-data:
  mysql-data:
  sqlite-data:
